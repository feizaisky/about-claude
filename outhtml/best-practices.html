# Claude Code 日常使用最佳实践

> **你的 AI Coding 效果不好，有可能是工具、技能、插件太多。**

> 上下文窗口只有几百K，每个插件都在蚕食它。减少噪声是提升效率的第一原则。

---

## 1. CLAUDE.md 即是记忆，代码即是文档

### 层级结构

```
~/.claude/CLAUDE.md          # 全局规则：极简，只写跨项目通用的偏好
~/project/CLAUDE.md          # 项目规则：主要规则来源
~/project/src/CLAUDE.md      # 目录规则：模块级补充（按需）
```

### 核心原则

- **不需要额外记忆插件**。代码本身、注释、docs/、CLAUDE.md 已经是完整的上下文。
- CLAUDE.md 写**规则和约定**，不写代码逻辑。逻辑读代码。
- 项目 CLAUDE.md 应包含：技术栈、代码风格、禁止行为、常用命令、架构约定。
- 全局 CLAUDE.md 只放真正跨项目的偏好（如语言偏好、输出风格），**保持 < 50 行**。

### 好的范例：规则写进 CLAUDE.md，而非装成插件

[andrej-karpathy-skills](https://github.com/forrestchang/andrej-karpathy-skills) 是这个理念的最佳示范——**一个 CLAUDE.md 文件，零插件，解决 LLM 编码的核心陋习**。

源自 Andrej Karpathy 的四条原则，直接 `curl` 进项目 CLAUDE.md 即可使用：

| 原则 | 解决的问题 |
|---|---|
| **编码前思考** | 不假设、不隐藏困惑、暴露权衡取舍 |
| **极简优先** | 过度设计、臃肿抽象、不必要的配置化 |
| **手术式修改** | 改动扩散到无关代码、顺手"优化"旁边的代码 |
| **目标驱动执行** | 给成功标准而非步骤，让 Claude 自己验证循环 |

```bash
# 追加到现有项目 CLAUDE.md
curl https://raw.githubusercontent.com/forrestchang/andrej-karpathy-skills/main/CLAUDE.md >> CLAUDE.md
```

> **关键洞察**：好的行为约束放进 CLAUDE.md > 装成 Plugin/Skill。  
> Plugin 占用上下文空间且跨项目生效；CLAUDE.md 按项目隔离，随 git 一起版本化。

### 项目 CLAUDE.md 模板

```markdown
# 项目名

## 技术栈
- 语言/框架版本
- 包管理器

## 开发命令
- 启动：`npm dev`
- 测试：`npm test`
- 构建：`npm build`

## 代码约定
- 命名规范、文件结构
- 禁止事项（如不用 any、不 mock DB）

## 架构说明
- 模块职责简述
- 关键路径说明
```

### 🔥 反面案例：规则膨胀反噬

> **场景**：团队觉得"规则写得越细越安全"，`CLAUDE.md` 累积到 800 行。  
> **翻车点**：注意力被稀释，关键的 `"不要改 migrations/"` 埋在第 500 行，某次重构它真的动了老迁移。  
> **后果**：生产库回滚 + 重跑迁移 + 对 CLAUDE.md 整体失去信任。  
> **正解**：项目级 < 200 行、全局 < 50 行；规则必须**可验证**（"修改 `migrations/*` 前必须问我"），而不是堆一堆"尽量不要..."。

## 2. 提示词：准确优于啰嗦

### 好提示词的特征

| 差 | 好 |
|---|---|
| "优化这段代码" | "减少 `processOrders()` 的嵌套层级，保持逻辑不变" |
| "修复 bug" | "修复 `auth.ts:142` 的空指针，`user` 可能为 undefined" |
| "加个功能" | "在 `UserList` 组件加分页，每页 20 条，复用现有 `Pagination` 组件" |

### 规则

1. **指定文件和行号**，而不是描述症状
2. **说明约束条件**：不改接口、不引入新依赖、保持现有测试通过
3. **给出验收标准**：怎样算完成
4. 一次请求**只做一件事**，复杂任务分步

### 🔥 反面案例："顺便也整理一下"炸弹

> **场景**：本意修一个小 bug，提示词末尾随手加 "顺便把这块代码整理一下"。  
> **翻车点**：`整理` 是无界词——抽象层、导入顺序、命名、无关函数全被动。  
> **后果**：diff 2000+ 行，bug 修了但 PR 没人敢 review。  
> **正解**：一个会话只做一件事。要整理**另开任务 + 手术式边界**："重构 `src/orders/process.ts` 的 `processBatch()`，保持对外行为不变，其他文件不要动"。

## 3. 规则管理：全局精简，项目专注

### 原则

- **全局规则**：只放语言偏好、输出风格等不依赖项目的内容
- **项目规则**：技术栈约定、禁止行为、业务规范
- **目录规则**：模块特有约定（如 API 层不直接操作 DB）

### MCP / Plugin / Skill / Agent 配置

每一项扩展都会将自身的 tool definitions、system prompt 片段注入上下文，**无论你用不用它，空间都被占掉了**。

#### 大忌：大杂烩式安装

> [everything-claude-code](https://github.com/affaan-m/everything-claude-code) 这类"全家桶"包，一次性装入几十个 MCP、Skill、Agent。  
> **克制安装**，每新增一项都问自己：这个项目真的需要它吗？

#### 安装原则

| 类型 | 全局 | 项目级 |
|---|---|---|
| MCP | 只留通用工具（文件系统、搜索） | 按需：Figma（设计项目）、Playwright（UI 测试）、数据库（后端项目） |
| Skill | 只留高频跨项目的（如 /commit） | 按需：前端设计 Skill 只在前端项目装 |
| Agent | 不建议全局装自定义 Agent | 专项任务用完即删 |
| Plugin | 最小化，每个都是上下文负担 | 优先项目级安装 |

#### 项目级禁用示例

```jsonc
// .claude/settings.json（项目级）
{
  "mcpServers": {
    // 只声明本项目需要的
  },
  "disabledMcpServers": [
    "figma",       // 纯后端项目不需要
    "playwright",  // 非 UI 项目不需要
    "notebooklm"   // 与本项目无关
  ]
}
```

### 🔥 反面案例：全家桶 MCP 让 Claude "创造性用工具"

> **场景**：为了"一劳永逸"，全局装了 notion / slack / figma / playwright / jira / github / 数据库，共 15 个 MCP。  
> **翻车点**：tool definitions 吃掉 30k+ token；Claude 开始"创造性"选工具——明明该用 `Read` 读本地代码，它去调 playwright 浏览 GitHub；该看本地 log 文件，它去开 jira。  
> **后果**：每次响应慢、账单涨、结果离谱。  
> **正解**：MCP **按项目级启用**，全局只留文件系统等通用工具。项目不需要的在 `.claude/settings.json` 里用 `disabledMcpServers` 精准关闭。

## 4. Plan → Execute：先想清楚再动手

### 工作流

```
1. 描述任务
2. Claude 进入 Plan 模式，探索代码，给出方案
3. 审查方案：文件范围、改动点、潜在风险
4. 确认后执行
5. 验证结果
```

### 何时强制 Plan

- 改动超过 3 个文件
- 涉及数据库 schema 变更
- 修改公共接口/API
- 重构或架构调整

### 触发方式

- 快捷键 `Shift+Tab` 切换 Plan/Execute 模式
- 提示词末尾加：`先分析再执行，列出改动文件和方案后等我确认`

> Plan 模式下 Claude **不会执行任何写操作**，只读代码、给方案。这是它的安全特性。

### 🔥 反面案例：Plan 给了但没审就同意

> **场景**：Claude 输出 Plan，熟手扫一眼"看起来合理"，直接 approve。  
> **翻车点**：Plan 第 7 行写着 `"更新 migrations/000_init.sql 以匹配新 schema"`，没细看就过了。  
> **后果**：下次部署时生产库 schema 崩坏。  
> **正解**：Plan 出来**先 grep 高风险关键词**再逐行审 —— `migration`、`schema`、`.env`、`deploy`、`drop`、`rm -rf`、`force`、`truncate`。命中任何一个都必须停下来逐行看。

## 5. 上下文管理：减少噪声

### 文件访问控制：`permissions.deny` 是正解

新手常见的两个误解，先纠正：

| 误解 | 事实（来自官方 [settings 文档](https://code.claude.com/docs/en/settings) & GitHub issues） |
|---|---|
| "Claude 会 respect `.gitignore`" | ❌ 只有 `respectGitignore` 设置，**仅影响 `@` 文件选择器的补全建议**，不阻止 Read/Grep/Glob 主动读取 |
| "加 `.claudeignore` 就能排除" | ❌ **不是官方特性**，[Issue #36163](https://github.com/anthropics/claude-code/issues/36163) 确认即使创建也不可靠 |
| "用 `ignorePatterns`" | ❌ 已废弃，官方原话：**"This replaces the deprecated `ignorePatterns` configuration"** |

**官方正解**：在 `.claude/settings.json` 用 `permissions.deny` 规则。匹配的文件会从 file discovery / search 中排除，Read 操作被直接拒绝。

#### 推荐模板

```jsonc
// .claude/settings.json （提交入库，团队共享）
{
  "permissions": {
    "deny": [
      // 密钥与敏感配置（最重要）
      "Read(./.env)",
      "Read(./.env.*)",
      "Read(./secrets/**)",
      "Read(./**/*.pem)",
      "Read(./**/credentials.json)",
      "Read(./**/*.key)",

      // 大型生成物 / 快照，避免污染上下文
      "Read(./**/*.snap)",
      "Read(./**/*.min.js)",
      "Read(./**/*.lock)"
    ]
  }
}
```

#### 判断原则：什么该 deny，什么不用

| 文件类型 | 处理 | 理由 |
|---|---|---|
| `.env` / 密钥 / 凭据 / `*.pem` | ✅ **必须 deny** | `.gitignore` 挡不住 Claude 读取 |
| `node_modules/` / `dist/` / `.next/` | 🟡 **通常不用** | Claude 不会主动扫，靠 `.gitignore` 足够 |
| 大型快照 / 日志 / fixture | 🟡 **按需 deny** | 只有被误读、影响上下文时才加 |
| 内部文档 / ADR | ❌ **不要 deny** | Claude 需要读这些来理解项目 |

#### 个人 vs 团队规则

| 文件 | 实际位置 | 用途 | 入库 |
|---|---|---|---|
| `.claude/settings.json` | **项目根目录**下 | 团队共享的隔离规则（密钥、敏感目录等） | ✅ 提交 |
| `.claude/settings.local.json` | **项目根目录**下 | 个人偏好覆盖（本地 debug 开关、个人路径） | ❌ 放 `.gitignore` |
| `~/.claude/settings.json` | **家目录**下（跨项目） | 全局偏好（跨项目生效的 deny、个人 allow 列表） | —— |

> 辨认：路径以 `~/` 开头 = 家目录里的全局配置；不带 `~/` = 项目根下的 `.claude/` 子目录。

规则按优先级合并：managed > project > local > user，**deny 永远优先于 allow**。

#### 规则语法速记

```
Read(./.env)              项目相对路径
Read(//etc/passwd)        绝对路径（双斜杠）
Read(./**/*.pem)          递归通配
Edit(./migrations/**)     也能限制 Edit
Bash(git push --force *)  限制 shell 命令模式
```

完整参考：[Permission rule syntax](https://docs.anthropic.com/en/permissions#permission-rule-syntax)

> **做不做的决策线**：哪怕只加一条 `Read(./.env)` 也比不加强一百倍。别追求完美配置，先把最关键的挡住。

### 上下文污染源

| 来源 | 影响 | 对策 |
|---|---|---|
| 全局 MCP tool definitions | 每个 MCP 几百 token | 只启用必要的 |
| 冗长的 CLAUDE.md | 每次都注入 | 精简到关键规则 |
| 过长的对话历史 | 稀释相关信息 | 任务完成后开新会话 |
| 无关文件被 Read | 占用窗口 | 明确指定文件路径 |
| 大型 diff/日志 | 快速消耗上下文 | 只粘贴关键片段 |

### 实践建议

- **一个任务一个会话**，完成后开新对话，不要在同一会话累积无关历史
- 贴代码时只贴**相关函数**，不贴整个文件
- 错误日志只贴**关键错误行**，不贴完整 stack trace
- 让 Claude 用 `Grep`/`Glob` 自己找文件，而不是把所有文件都 `Read` 进来

### 长会话拆分

单次对话超过上下文窗口 60-70% 后，效果显著下降。

- 用 `/compact` 主动压缩当前对话
- 大任务拆成多轮，每轮产出写入文件，下轮从文件继续
- 在 CLAUDE.md 记录"当前进度检查点"，新会话可直接衔接

## 6. 迭代节奏：小步快跑

### 原则

- 每次改动后**立即验证**（跑测试/刷新页面）
- 不要攒一大批改动一起验证
- 出错时**先读错误**，再决定是否重试
- 不要让 Claude 连续执行超过 5 步而不验证

### 工作单元

```
改动 → 验证 → 改动 → 验证
  ↑___________↑
     最小循环
```

### 🔥 反面案例：攒 30 处改动后一次跑测试

> **场景**：觉得"小步验证太慢"，让 Claude 连续改 30 个文件，最后一次 `pnpm test`。  
> **翻车点**：47 个 case 挂，无法二分定位哪一步引入的。  
> **后果**：要么 `git restore .` 全丢、要么逐个 revert 猜错，省下的时间加倍还回去。  
> **正解**：每 2-3 个文件必须 `!pnpm test` 或类型检查一次。也可以让 `PostToolUse` hook 自动跑 `tsc --noEmit`（§8），坏就立刻停。

## 7. 权限模式：安全与效率的平衡

### 三种模式

| 模式 | 适用场景 | 风险 |
|---|---|---|
| **默认（审批模式）** | 日常开发，推荐 | 低，每步确认 |
| **`--allowedTools` 精细授权** | 熟悉的项目，高频操作 | 中，可控 |
| **`--dangerously-skip-permissions`** | 一次性脚本、沙盒环境 | 高，无确认 |

### 推荐：精细授权

```bash
# 只放行读操作和 git，写操作仍需确认
claude --allowedTools "Bash(git *)" "Read" "Grep" "Glob"
```

> Yolo 模式（`--dangerously-skip-permissions`）听起来很爽，但在真实项目上一次误操作的代价远高于多点几次确认。

## 8. Hooks：让自动化替你省上下文

在 `.claude/settings.json` 配置 hooks，减少"修格式"等无效来回：

```jsonc
{
  "hooks": {
    "PostToolUse": [
      {
        "matcher": "Edit|Write",
        "command": "eslint --fix $CLAUDE_FILE_PATH"
      }
    ]
  }
}
```

### 典型场景

- **PostToolUse**：每次编辑后自动 lint/format，避免攒到最后才发现
- **PreCommit**：commit 前自动跑类型检查
- **自定义校验**：写入文件后检查是否符合项目规范

> 每次让 Claude 手动修格式都是浪费上下文。Hook 一劳永逸。

### 🔥 反面案例：坏 hook 把 Claude 拖进自我纠错循环

> **场景**：配了 `PostToolUse`：`{ "matcher": "Edit|Write", "command": "prettier --write $CLAUDE_FILE_PATH" }`  
> **翻车点**：Claude 写了个 `.md` / `.yaml`，prettier 不识别或配置错，返回 non-zero + stderr 输出一大堆。  
> **后果**：Claude 看到错误输出，以为自己写错了，开始"修复" → 再触发 hook → 再报错……同一个文件被反复改。  
> **正解**：hook 必须 **defensive**：
> - `matcher` 精确到扩展名：`"Edit.*\\.(ts|tsx|js|jsx)$"`
> - 命令末尾加 `|| true` 防非零退出污染 Claude 上下文
> - 上线前**本地手工跑一遍**确认退出码和 stderr 干净

## 9. 版本控制集成

- 任何大改动前先 `git commit`，给 Claude 一个干净的起点
- 用 `git diff` 审查 Claude 的改动，再决定是否 commit
- 复杂任务用 worktree 隔离：`/worktree feature-xxx`，完成后合并
- 让 Claude 自动生成 commit message：`/commit`

---

## 10. 安全边界

Claude Code 默认会请求确认高风险操作，但养成习惯：

- **永远不要** 让 Claude 在没有确认的情况下 `force push`、`DROP TABLE`、`rm -rf`
- 生产环境操作前明确说："这是生产环境，每步都要我确认"
- 敏感文件（`.env`、credentials）加入 `.gitignore`，不要让 Claude commit

## 11. 子代理（Subagent）策略

子代理在独立上下文中运行，结果摘要回传，**不污染主上下文**。

### 何时用

| 场景 | 方式 |
|---|---|
| 简单查找（找函数、找文件） | 直接 Grep/Glob，不启子代理 |
| 中等复杂探索（理解一个模块） | Explore agent |
| 多路并行调研 | 同时启多个子代理，各查各的 |
| 批量重构（改 20 个文件的同一模式） | 子代理隔离执行，主会话汇总 |

### 原则

- **不要为简单操作启子代理**——启动成本不值得
- 并行子代理用于**独立且互不依赖**的子任务
- 子代理可配置用较低成本模型（如 Haiku），省钱不占主上下文

### 🔥 反面案例：并行子代理改同一文件打架

> **场景**：一次提示里让它"并行做 A、B、C 三件事"，Claude 启了 3 个子代理。  
> **翻车点**：A 代理改 `user.ts` 加字段，B 代理也改 `user.ts` 加校验，C 代理读到的是合并前的旧版。  
> **后果**：3 份 diff 相互覆盖，最终代码半成品 + 测试挂 + merge conflict。  
> **正解**：并行子代理任务必须**文件域隔离**——提示里明确划分边界：
> - Agent A 只动 `src/api/**`
> - Agent B 只动 `src/ui/**`
> - Agent C 只读不写  
> 共享文件的改动只能**串行**，不要并行。

## 12. 模型选择策略

不同任务适配不同模型，别一把梭哈最贵的：

| 模型 | 擅长 | 适用场景 |
|---|---|---|
| **Opus** | 复杂推理、架构设计、大范围重构 | Plan 阶段、疑难 bug、跨模块设计 |
| **Sonnet** | 日常编码、平衡性价比 | 功能开发、代码审查、常规修复 |
| **Haiku** | 快速响应、简单任务 | 子代理调研、格式化、简单查询 |

```bash
# 日常开发用 Sonnet
claude --model sonnet

# 复杂设计切 Opus
# 会话中用 /model 切换
```

> 用 Opus 来修 typo 是浪费；用 Haiku 来做架构设计是勉强。匹配任务复杂度。

### 🔥 反面案例：默认 Opus 聊出高额账单

> **场景**：从没配过 `/model`，每次启动都是 Opus；"加个注释"、"帮我看看这行代码"也走 Opus。  
> **翻车点**：Opus 输入 token ≈ Sonnet 的 5×，长会话又不 `/compact`，成本指数级累积。  
> **后果**：月底 `/cost` 一看账单，是预期的 5-8 倍。  
> **正解**：全局 `~/.claude/settings.json` 设默认为 Sonnet：
> ```json
> { "model": "claude-sonnet-4-5" }
> ```
> 复杂架构/疑难 bug 时临时 `/model opus`；子代理里跑 explore/调研用 Haiku。

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
    (function () {
      var mdEl = document.getElementById('md-content');
      var md = mdEl.textContent.replace(/^\s+/, '');
      marked.setOptions({ gfm: true, breaks: false });
      var article = document.getElementById('content');
      article.innerHTML = marked.parse(md);

      article.querySelectorAll('a[href]').forEach(function (a) {
        var href = a.getAttribute('href');
        if (!href) return;
        if (href.indexOf('claude-code-best-practices.md') !== -1) {
          href = href.replace('claude-code-best-practices.md', 'best-practices.html');
        } else if (href.indexOf('claude-code-cheatsheet.md') !== -1) {
          href = href.replace('claude-code-cheatsheet.md', 'cheatsheet.html');
        } else if (/(^|\/)README\.md($|#)/.test(href)) {
          href = '../index.html';
        }
        a.setAttribute('href', href);
      });

      function slugify(t) {
        return t.toLowerCase()
          .replace(/[^\w\u4e00-\u9fa5\s-]/g, '')
          .trim()
          .replace(/\s+/g, '-');
      }
      article.querySelectorAll('h1, h2, h3, h4').forEach(function (h) {
        if (!h.id) h.id = slugify(h.textContent);
      });

      var toc = document.getElementById('toc');
      var h2s = Array.prototype.slice.call(article.querySelectorAll('h2'))
        .filter(function (h) { return h.textContent.trim() !== '目录'; });
      h2s.forEach(function (h) {
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        li.appendChild(a);
        toc.appendChild(li);
      });

      var tocLinks = toc.querySelectorAll('a');
      var headings = h2s;
      function sync() {
        if (!headings.length) return;
        var y = window.scrollY + 120;
        var idx = 0;
        for (var i = 0; i < headings.length; i++) {
          if (headings[i].offsetTop <= y) idx = i;
        }
        tocLinks.forEach(function (a, i) { a.classList.toggle('active', i === idx); });
      }
      window.addEventListener('scroll', sync, { passive: true });
      sync();

      var h1 = article.querySelector('h1');
      if (h1) document.title = h1.textContent.trim() + ' · About Claude';
    })();
  </script>
