n/:fileKey/:fileName?node-id=1-2, the extracted nodeId would be `1:2` and the fileKey would be `:fileKey`.", "input_schema": {"type": "object", "properties": {"nodeId": {"type": "string", "pattern": "^$|^(?:-?\\d+[:-]-?\\d+)$", "description": "The ID of the node in the Figma document, eg. \"123:456\" or \"123-456\". This should be a valid node ID in the Figma document."}, "fileKey": {"type": "string", "description": "The key of the Figma file to use. If the URL is provided, extract the file key from the URL. The given URL must be in the format https://figma.com/design/:fileKey/:fileName?node-id=:int1-:int2. The extracted fileKey would be `:fileKey`."}, "clientLanguages": {"type": "string", "description": "A comma separated list of programming languages used by the client in the current context in string form, e.g. `javascript`, `html,css,typescript`, etc. If you do not know, please list `unknown`. This is used for logging purposes to understand which languages are being used. If you are unsure, it is better to list `unknown` than to make a guess."}, "clientFrameworks": {"type": "string", "description": "A comma separated list of frameworks used by the client in the current context, e.g. `react`, `vue`, `django` etc. If you do not know, please list `unknown`. This is used for logging purposes to understand which frameworks are being used. If you are unsure, it is better to list `unknown` than to make a guess"}}, "required": ["nodeId", "fileKey"], "additionalProperties": false, "$schema": "http://json-schema.org/draft-07/schema#"}}, {"name": "mcp__figma__get_design_context", "description": "Get design context for a Figma node — the primary tool for design-to-code workflows. Returns reference code, a screenshot, and contextual metadata that should be adapted to the target project. See the server instructions for how to interpret and adapt the response. \n\nUse the nodeId parameter to specify a node id. Use the fileKey parameter to specify the file key. If a URL is provided, extract the node id and file key from the URL, for example, if given the URL https://figma.com/design/:fileKey/:fileName?node-id=1-2, the extracted nodeId would be `1:2` and the fileKey would be `:fileKey`. If the URL is of the format https://figma.com/design/:fileKey/branch/:branchKey/:fileName then use the branchKey as the fileKey. If the URL is of the format https://figma.com/make/:makeFileKey/:makeFileName then use the makeFileKey to identify the Figma Make file. The response will contain a code string and a JSON of download URLs for the assets referenced in the code. It will also include a screenshot of the node for context by default.", "input_schema": {"type": "object", "properties": {"nodeId": {"type": "string", "pattern": "^$|^(?:-?\\d+[:-]-?\\d+)$", "description": "The ID of the node in the Figma document, eg. \"123:456\" or \"123-456\". This should be a valid node ID in the Figma document."}, "fileKey": {"type": "string", "description": "The key of the Figma file to use. If the URL is provided, extract the file key from the URL. The given URL must be in the format https://figma.com/design/:fileKey/:fileName?node-id=:int1-:int2. The extracted fileKey would be `:fileKey`."}, "clientLanguages": {"type": "string", "description": "A comma separated list of programming languages used by the client in the current context in string form, e.g. `javascript`, `html,css,typescript`, etc. If you do not know, please list `unknown`. This is used for logging purposes to understand which languages are being used. If you are unsure, it is better to list `unknown` than to make a guess."}, "clientFrameworks": {"type": "string", "description": "A comma separated list of frameworks used by the client in the current context, e.g. `react`, `vue`, `django` etc. If you do not know, please list `unknown`. This is used for logging purposes to understand which frameworks are being used. If you are unsure, it is better to list `unknown` than to make a guess"}, "forceCode": {"type": "boolean", "description": "Whether code should always be returned, instead of returning just metadata if the output size is too large. Only set this when the user directly requests to force the code. "}, "disableCodeConnect": {"type": "boolean", "description": "Whether Code Connect should be used to get the design context. Only set this when the user directly requests to disable Code Connect."}, "excludeScreenshot": {"type": "boolean", "description": "Whether to exclude the screenshot of the design from the response. IMPORTANT: it is not recommended to exclude screenshots. Only set this to true if the user has explicitly requested it or you are trying to preserve context."}}, "required": ["nodeId", "fileKey"], "additionalProperties": false, "$schema": "http://json-schema.org/draft-07/schema#"}}, {"name": "mcp__figma__get_figjam", "description": "Generate UI code for a given FigJam node in Figma. Use the nodeId parameter to specify a node id. If no node id is provided, use `0:1` which is the root node ID. Use the fileKey parameter to specify the file key. If a URL is provided, extract the node id from the URL, for example, if given the URL https://figma.com/board/:fileKey/:fileName?node-id=1-2, the extracted nodeId would be `1:2` and the fileKey would be `:fileKey`. IMPORTANT: This tool only works for FigJam files, not other Figma files.", "input_schema": {"type": "object", "properties": {"nodeId": {"type": "string", "pattern": "^$|^(?:-?\\d+[:-]-?\\d+)$", "description": "The ID of the node in the Figma document, eg. \"123:456\" or \"123-456\". This should be a valid node ID in the Figma document."}, "fileKey": {"type": "string", "description": "The key of the Figma file to use. If the URL is provided, extract the file key from the URL. The given URL must be in the format https://figma.com/design/:fileKey/:fileName?node-id=:int1-:int2. The extracted fileKey would be `:fileKey`."}, "includeImagesOfNodes": {"type": "boolean", "default": true, "description": "Whether to include images of nodes in the response"}}, "required": ["nodeId", "fileKey"], "additionalProperties": false, "$schema": "http://json-schema.org/draft-07/schema#"}}, {"name": "mcp__figma__get_metadata", "description": "IMPORTANT: Always prefer to use get_design_context tool. Get metadata for a node or page in the Figma desktop app in XML format. Useful only for getting an overview of the structure, it only includes node IDs, layer types, names, positions and sizes. You can call get_design_context on the node IDs contained in this response. Use the nodeId parameter to specify a node id, it can also be the page id (e.g. 0:1). NEVER call get_metadata for Figma Make files.Extract the node id from the URL, for example, if given the URL https://figma.com/design/:fileKey/:fileName?node-id=1-2, the extracted nodeId would be `1:2`. If the URL is of the format https://figma.com/design/:fileKey/branch/:branchKey/:fileName then use the branchKey as the fileKey.", "input_schema": {"type": "object", "properties": {"nodeId": {"type": "string", "pattern": "^$|^(?:-?\\d+[:-]-?\\d+)$", "description": "The ID of the node in the Figma document, eg. \"123:456\" or \"123-456\". This should be a valid node ID in the Figma document."}, "fileKey": {"type": "string", "description": "The key of the Figma file to use. If the URL is provided, extract the file key from the URL. The given URL must be in the format https://figma.com/design/:fileKey/:fileName?node-id=:int1-:int2. The extracted fileKey would be `:fileKey`."}, "clientLanguages": {"type": "string", "description": "A comma separated list of programming languages used by the client in the current context in string form, e.g. `javascript`, `html,css,typescript`, etc. If you do not know, please list `unknown`. This is used for logging purposes to understand which languages are being used. If you are unsure, it is better to list `unknown` than to make a guess."}, "clientFrameworks": {"type": "string", "description": "A comma separated list of frameworks used by the client in the current context, e.g. `react`, `vue`, `django` etc. If you do not know, please list `unknown`. This is used for logging purposes to understand which frameworks are being used. If you are unsure, it is better to list `unknown` than to make a guess"}}, "required": ["nodeId", "fileKey"], "additionalProperties": false, "$schema": "http://json-schema.org/draft-07/schema#"}}, {"name": "mcp__figma__get_screenshot", "description": "Generate a screenshot for a given node or the currently selected node in the Figma desktop app. Use the nodeId parameter to specify a node id. nodeId parameter is REQUIRED. Use the fileKey parameter to specify the file key. fileKey parameter is REQUIRED. If a URL is provided, extract the file key and node id from the URL. For example, if given the URL https://figma.com/design/pqrs/ExampleFile?node-id=1-2 the extracted fileKey would be `pqrs` and the extracted nodeId would be `1:2`. If the URL is of the format https://figma.com/design/:fileKey/branch/:branchKey/:fileName then use the branchKey as the fileKey.", "input_schema": {"type": "object", "properties": {"nodeId": {"type": "string", "pattern": "^$|^(?:-?\\d+[:-]-?\\d+)$", "description": "The ID of the node in the Figma document, eg. \"123:456\" or \"123-456\". This should be a valid node ID in the Figma document."}, "fileKey": {"type": "string", "description": "The key of the Figma file to use. If the URL is provided, extract the file key from the URL. The given URL must be in the format https://figma.com/design/:fileKey/:fileName?node-id=:int1-:int2. The extracted fileKey would be `:fileKey`."}}, "required": ["nodeId", "fileKey"], "additionalProperties": false, "$schema": "http://json-schema.org/draft-07/schema#"}}, {"name": "mcp__figma__get_variable_defs", "description": "Get variable definitions for a given node id. E.g. {'icon/default/secondary': #949494}Variables are reusable values that can be applied to all kinds of design properties, such as fonts, colors, sizes and spacings. Use the nodeId parameter to specify a node id. Extract the node id from the URL, for example, if given the URL https://figma.com/design/:fileKey/:fileName?node-id=1-2, the extracted nodeId would be `1:2`. If the URL is of the format https://figma.com/design/:fileKey/branch/:branchKey/:fileName then use the branchKey as the fileKey.", "input_schema": {"type": "object", "properties": {"nodeId": {"type": "string", "pattern": "^$|^(?:-?\\d+[:-]-?\\d+)$", "description": "The ID of the node in the Figma document, eg. \"123:456\" or \"123-456\". This should be a valid node ID in the Figma document."}, "fileKey": {"type": "string", "description": "The key of the Figma file to use. If the URL is provided, extract the file key from the URL. The given URL must be in the format https://figma.com/design/:fileKey/:fileName?node-id=:int1-:int2. The extracted fileKey would be `:fileKey`."}, "clientLanguages": {"type": "string", "description": "A comma separated list of programming languages used by the client in the current context in string form, e.g. `javascript`, `html,css,typescript`, etc. If you do not know, please list `unknown`. This is used for logging purposes to understand which languages are being used. If you are unsure, it is better to list `unknown` than to make a guess."}, "clientFrameworks": {"type": "string", "description": "A comma separated list of frameworks used by the client in the current context, e.g. `react`, `vue`, `django` etc. If you do not know, please list `unknown`. This is used for logging purposes to understand which frameworks are being used. If you are unsure, it is better to list `unknown` than to make a guess"}}, "required": ["nodeId", "fileKey"], "additionalProperties": false, "$schema": "http://json-schema.org/draft-07/schema#"}}, {"name": "mcp__figma__search_design_system", "description": "Search for design system assets (components, variables, and styles) based on a text query. Returns matching assets from all design libraries. Use this when you need to find specific components, variables (e.g. colors, spacing tokens), or styles from design libraries.", "input_schema": {"type": "object", "properties": {"query": {"type": "string", "description": "Text query to search for design system components"}, "fileKey": {"type": "string", "description": "The file key for context"}, "disableCodeConnect": {"type": "boolean", "description": "Whether to disable Code Connect for search results."}, "includeComponents": {"type": "boolean", "default": true, "description": "Whether to include components in the search results. Defaults to true."}, "includeVariables": {"type": "boolean", "default": true, "description": "Whether to include variables in the search results. Defaults to true."}, "includeStyles": {"type": "boolean", "default": true, "description": "Whether to include styles in the search results. Defaults to true."}, "includeLibraryKeys": {"type": "array", "items": {"type": "string"}, "description": "Optional list of library keys to restrict the search to. When provided, only results from these libraries are returned. Library keys are returned in previous search results."}}, "required": ["query", "fileKey"], "additionalProperties": false, "$schema": "http://json-schema.org/draft-07/schema#"}}, {"name": "mcp__figma__send_code_connect_mappings", "description": "Save multiple Code Connect mappings in bulk. Use after get_code_connect_suggestions to confirm and save approved mappings. \n\nUse the nodeId parameter to specify a node id. Use the fileKey parameter to specify the file key. If a URL is provided, extract the node id and file key from the URL, for example, if given the URL https://figma.com/design/:fileKey/:fileName?node-id=1-2, the extracted nodeId would be `1:2` and the fileKey would be `:fileKey`.", "input_schema": {"type": "object", "properties": {"nodeId": {"type": "string", "pattern": "^$|^(?:-?\\d+[:-]-?\\d+)$", "description": "The ID of the node in the Figma document, eg. \"123:456\" or \"123-456\". This should be a valid node ID in the Figma document."}, "fileKey": {"type": "string", "description": "The key of the Figma file to use. If the URL is provided, extract the file key from the URL. The given URL must be in the format https://figma.com/design/:fileKey/:fileName?node-id=:int1-:int2. The extracted fileKey would be `:fileKey`."}, "clientLanguages": {"type": "string", "description": "A comma separated list of programming languages used by the client in the current context in string form, e.g. `javascript`, `html,css,typescript`, etc. If you do not know, please list `unknown`. This is used for logging purposes to understand which languages are being used. If you are unsure, it is better to list `unknown` than to make a guess."}, "clientFrameworks": {"type": "string", "description": "A comma separated list of frameworks used by the client in the current context, e.g. `react`, `vue`, `django` etc. If you do not know, please list `unknown`. This is used for logging purposes to understand which frameworks are being used. If you are unsure, it is better to list `unknown` than to make a guess"}, "mappings": {"type": "array", "items": {"type": "object", "properties": {"nodeId": {"type": "string", "description": "The Figma node identifier"}, "componentName": {"type": "string", "description": "The component name, e.g. \"Button/Primary\""}, "source": {"type": "string", "description": "The path to the component in the codebase"}, "label": {"type": "string", "enum": ["React", "Web Components", "Vue", "Svelte", "Storybook", "Javascript", "Swift", "Swift UIKit", "Objective-C UIKit", "SwiftUI", "Compose", "Java", "Kotlin", "Android XML Layout", "Flutter", "Markdown"], "description": "The framework or language label for this Code Connect mapping"}, "template": {"type": "string", "description": "The executable JS template code for a Code Connect template. When provided, creates a figmadoc-type record (full template) instead of a component_browser mapping (simple mapping)."}, "templateDataJson": {"type": "string", "description": "JSON string of template metadata. May include isParserless (boolean), imports, nestable, props fields. If omitted when template is provided, defaults to {}."}}, "required": ["nodeId", "componentName", "source", "label"], "additionalProperties": false, "description": "An array of Code Connect mapping objects used to map nodes to code components"}}}, "required": ["nodeId", "fileKey", "mappings"], "additionalProperties": false, "$schema": "http://json-schema.org/draft-07/schema#"}}, {"name": "mcp__figma__use_figma", "description": "Run JavaScript in a Figma file via the Plugin API. This is the general-purpose tool for writing to Figma — use it to create, edit, delete, or inspect any Figma object (pages, frames, components, variants, variables, styles, text, images, etc.).\nIMPORTANT: If the /figma-use skill is available, load it before calling this tool.\nUse this tool when the user wants to:\n- Create or modify designs directly in Figma\n- Generate or sync Figma designs from source code\n- Set up design tokens, variables, or styles\n- Build or update component/variant systems\n- Fix layout, spacing, auto-layout, or fill/hug issues\n- Add component descriptions or Code Connect metadata to nodes\n- Review or fix accessibility, contrast, typography, or visual polish\n- Inspect or query node properties programmatically\n\nGOTCHAS:\n- For the font \"Inter\", the style is \"Semi Bold\" (with a space), not \"SemiBold\". Same for \"Extra Bold\" not \"ExtraBold\"\n- Setting figma.currentPage is not supported. Use `await figma.setCurrentPageAsync(page)` instead\n\n\nCHOOSING BETWEEN use_figma AND generate_figma_design:\n- Default to this tool (use_figma) for all Figma write operations.\n- The only exception is generate_figma_design, which should be used when capturing a web app page or view into Figma for the first time.\n- Use this tool when the user wants to update or sync a page or view that has already been captured — even if the code has changed, even for web apps.\n- When in doubt, use this tool.\n\nBefore creating components, call search_design_system to check for existing design system components to reuse. Import matches via importComponentByKeyAsync/importComponentSetByKeyAsync instead of recreating them.", "input_schema": {"type": "object", "properties": {"fileKey": {"type": "string", "description": "The key of the Figma file to use. If the URL is provided, extract the file key from the URL. The given URL must be in the format https://figma.com/design/:fileKey/:fileName?node-id=:int1-:int2. The extracted fileKey would be `:fileKey`."}, "code": {"type": "string", "maxLength": 50000, "description": "JavaScript code to execute. Has access to the `figma` global (Figma Plugin API)"}, "description": {"type": "string", "maxLength": 2000, "description": "A concise description of what the code aims to do"}, "skillNames": {"type": "string", "description": "A comma-separated list of Figma skill names being followed, if any (e.g. \"figma-use\", \"figma-use,figma-generate-design\"). Only pass this when explicitly instructed to by skill documentation. Used for logging purposes."}}, "required": ["fileKey", "code", "description"], "additionalProperties": false, "$schema": "http://json-schema.org/draft-07/schema#"}}, {"name": "mcp__figma__whoami", "description": "Returns information about the authenticated user. If you are experiencing permission issues with other tools, you can use this tool to get information about who is authenticated and validate the right user is logged in.", "input_schema": {"type": "object", "properties": {}, "$schema": "http://json-schema.org/draft-07/schema#"}}, {"name": "mcp__plugin_claude-mem_mcp-search____IMPORTANT", "description": "3-LAYER WORKFLOW (ALWAYS FOLLOW):\n1. search(query) → Get index with IDs (~50-100 tokens/result)\n2. timeline(anchor=ID) → Get context around interesting results\n3. get_observations([IDs]) → Fetch full details ONLY for filtered IDs\nNEVER fetch full details without filtering first. 10x token savings.", "input_schema": {"type": "object", "properties": {}}}, {"name": "mcp__plugin_claude-mem_mcp-search__build_corpus", "description": "Build a knowledge corpus from filtered observations. Creates a queryable knowledge agent. Params: name (required), description, project, types (comma-separated), concepts (comma-separated), files (comma-separated), query, dateStart, dateEnd, limit", "input_schema": {"type": "object", "properties": {"name": {"type": "string", "description": "Corpus name (used as filename)"}, "description": {"type": "string", "description": "What this corpus is about"}, "project": {"type": "string", "description": "Filter by project"}, "types": {"type": "string", "description": "Comma-separated observation types: decision,bugfix,feature,refactor,discovery,change"}, "concepts": {"type": "string", "description": "Comma-separated concepts to filter by"}, "files": {"type": "string", "description": "Comma-separated file paths to filter by"}, "query": {"type": "string", "description": "Semantic search query"}, "dateStart": {"type": "string", "description": "Start date (ISO format)"}, "dateEnd": {"type": "string", "description": "End date (ISO format)"}, "limit": {"type": "number", "description": "Maximum observations (default 500)"}}, "required": ["name"], "additionalProperties": true}}, {"name": "mcp__plugin_claude-mem_mcp-search__get_observations", "description": "Step 3: Fetch full details for filtered IDs. Params: ids (array of observation IDs, required), orderBy, limit, project", "input_schema": {"type": "object", "properties": {"ids": {"type": "array", "items": {"type": "number"}, "description": "Array of observation IDs to fetch (required)"}}, "required": ["ids"], "additionalProperties": true}}, {"name": "mcp__plugin_claude-mem_mcp-search__list_corpora", "description": "List all knowledge corpora with their stats and priming status", "input_schema": {"type": "object", "properties": {}, "additionalProperties": true}}, {"name": "mcp__plugin_claude-mem_mcp-search__prime_corpus", "description": "Prime a knowledge corpus — creates an AI session loaded with the corpus knowledge. Must be called before query_corpus.", "input_schema": {"type": "object", "properties": {"name": {"type": "string", "description": "Name of the corpus to prime"}}, "required": ["name"], "additionalProperties": true}}, {"name": "mcp__plugin_claude-mem_mcp-search__query_corpus", "description": "Ask a question to a primed knowledge corpus. The corpus must be primed first with prime_corpus.", "input_schema": {"type": "object", "properties": {"name": {"type": "string", "description": "Name of the corpus to query"}, "question": {"type": "string", "description": "The question to ask"}}, "required": ["name", "question"], "additionalProperties": true}}, {"name": "mcp__plugin_claude-mem_mcp-search__rebuild_corpus", "description": "Rebuild a knowledge corpus from its stored filter — re-runs the search to refresh with new observations. Does not re-prime the session.", "input_schema": {"type": "object", "properties": {"name": {"type": "string", "description": "Name of the corpus to rebuild"}}, "required": ["name"], "additionalProperties": true}}, {"name": "mcp__plugin_claude-mem_mcp-search__reprime_corpus", "description": "Create a fresh knowledge agent session for a corpus, clearing prior Q&A context. Use when conversation has drifted or after rebuilding.", "input_schema": {"type": "object", "properties": {"name": {"type": "string", "description": "Name of the corpus to reprime"}}, "required": ["name"], "additionalProperties": true}}, {"name": "mcp__plugin_claude-mem_mcp-search__search", "description": "Step 1: Search memory. Returns index with IDs. Params: query, limit, project, type, obs_type, dateStart, dateEnd, offset, orderBy", "input_schema": {"type": "object", "properties": {}, "additionalProperties": true}}, {"name": "mcp__plugin_claude-mem_mc         document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });
  </script>
</body>
</html>
