        - code [ref=e393]: .claude/settings.json
        - text: 配置 hooks，减少"修格式"等无效来回：
      - code [ref=e395]: "{ \"hooks\": { \"PostToolUse\": [ { \"matcher\": \"Edit|Write\", \"command\": \"eslint --fix $CLAUDE_FILE_PATH\" } ] } }"
      - heading "典型场景" [level=3] [ref=e396]
      - list [ref=e397]:
        - listitem [ref=e398]:
          - strong [ref=e399]: PostToolUse
          - text: ：每次编辑后自动 lint/format，避免攒到最后才发现
        - listitem [ref=e400]:
          - strong [ref=e401]: PreCommit
          - text: ：commit 前自动跑类型检查
        - listitem [ref=e402]:
          - strong [ref=e403]: 自定义校验
          - text: ：写入文件后检查是否符合项目规范
      - blockquote [ref=e404]:
