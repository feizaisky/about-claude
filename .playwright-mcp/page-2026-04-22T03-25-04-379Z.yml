      - heading "5.2 修线上 Bug 的标准起手式" [level=3] [ref=e424]
      - code [ref=e426]: 1. git checkout -b fix/xxx 2. claude 3. 贴错误关键行 + 复现步骤（4.2 模板） 4. Plan 模式：让它定位根因，别急着改 5. 确认定位无误 → 执行最小修复 6. 补一个回归测试 7. 验证 → commit
      - heading "5.3 读懂一个陌生项目" [level=3] [ref=e427]
      - code [ref=e429]: 1. cd 到项目根 2. claude 3. > 读这个仓库，输出：1) 一句话定位 2) 主目录职责 3) 关键入口文件 4) 启动方式 4. > 挑 3 个最重要的模块，各用 50 字说明 5. > 把上面结论整理成 CLAUDE.md 的草稿
