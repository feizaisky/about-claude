        - text: 2.1 给项目一份
        - code [ref=e156]: CLAUDE.md
        - text: （最重要）
      - paragraph [ref=e157]:
        - text: 在项目根目录创建
        - code [ref=e158]: CLAUDE.md
        - text: ，它会在
        - strong [ref=e159]: 每次会话启动时自动注入上下文
        - text: 。新手模板：
      - code [ref=e161]: "# 项目名 ## 技术栈 - Node 20 / TypeScript 5 / Next.js 14 - 包管理：pnpm - 数据库：Postgres（本地 docker-compose 起） ## 开发命令 - 启动：`pnpm dev` - 测试：`pnpm test` - 类型检查：`pnpm typecheck` - Lint：`pnpm lint` ## 代码约定 - 禁止使用 `any`；用 `unknown` + 类型守卫 - 组件文件 kebab-case，导出用 PascalCase - 不要在组件里直接 fetch，统一走 `src/lib/api` ## 别动的地方 - `migrations/` 已上线的文件不要改 - `src/legacy/` 废弃代码，新功能别引用"
      - paragraph [ref=e162]:
        - strong [ref=e163]: 一条命令生成起步版本
        - text: ：
      - code [ref=e165]: claude > /init
      - paragraph [ref=e166]:
        - code [ref=e167]: /init
        - text: 会让 Claude 自己读仓库、起草一份
        - code [ref=e168]: CLAUDE.md
        - text: ，你再手动精修。
      - blockquote [ref=e169]:
        - paragraph [ref=e170]:
          - text: 💡
          - strong [ref=e171]:
            - code [ref=e172]: CLAUDE.md
            - text: 应该提交到 git 仓库
          - text: ，和代码一起版本化。
          - text: 它是
          - strong [ref=e173]: 团队共享的 AI 协作规约
          - text: ，不是个人配置：新人 clone 下来就自动继承规则；规则变更走 PR 评审；团队里每个人（和每个人的 Claude）看到的是同一份约定。
          - text: 个人偏好（语言、输出风格等）放在
          - code [ref=e174]: ~/.claude/CLAUDE.md
          - text: 全局文件里，那个不进仓库。
          - text: 规则速记：
          - strong [ref=e175]: 项目级 → 入库共享，用户级 → 本地私有
          - text: 。
